<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f9d72" />
    <title>RVerse Play Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f1;
        --line: #d7e4d2;
        --text: #12301f;
        --muted: #5f7067;
        --accent: #1f9d72;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        padding: 24px;
      }

      .mark {
        display: grid;
        height: 52px;
        width: 52px;
        place-items: center;
        background: var(--accent);
        color: white;
        font-weight: 900;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }

      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">RV</div>
      <h1>You are offline</h1>
      <p>RVerse Play needs a connection for live sessions, scores, queues, and billing. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
